name: dach-exec-job-alerts

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  models: read

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js (for MCP server runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install --quiet requests beautifulsoup4 openai

      # ------------------------------------------------------------------
      # Setup: Configure CA certificates from system for SSL verification
      #   If Zscaler certs are present in system trust store, they will be
      #   included automatically. Uses environment variables for flexibility.
      # ------------------------------------------------------------------
      - name: Setup CA certificate configuration
        run: |
          # Locate system CA bundle
          for ca_loc in /etc/ssl/certs/ca-bundle.crt /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem /etc/ssl/certs/ca-certificates.crt; do
            if [ -f "$ca_loc" ]; then
              echo "SCRAPER_CA_BUNDLE=$ca_loc" >> $GITHUB_ENV
              echo "Using CA bundle: $ca_loc"
              break
            fi
          done
          
          # If no system CA found, scraper will fall back to certifi or requests defaults
          if [ -z "$SCRAPER_CA_BUNDLE" ]; then
            echo "No system CA bundle found, scraper will use default certificate validation"
          fi

      # ------------------------------------------------------------------
      # Stage 1: deterministic scrape (pure Python + HTTP, no AI)
      # ------------------------------------------------------------------
      - name: Scrape jobs
        run: python .github/scripts/scrape_jobs.py
        env:
          SCRAPER_FAIL_ON_FETCH_ERROR: "false"
          # Optional self-hosted search provider (SearXNG)
          SCRAPER_SEARXNG_URL: ${{ secrets.SCRAPER_SEARXNG_URL }}
          SCRAPER_SEARXNG_KEY: ${{ secrets.SCRAPER_SEARXNG_KEY }}
          # Optional managed providers
          SCRAPER_SERPAPI_KEY: ${{ secrets.SCRAPER_SERPAPI_KEY }}
          SCRAPER_ZENSERP_KEY: ${{ secrets.SCRAPER_ZENSERP_KEY }}

      # ------------------------------------------------------------------
      # Stage 1b: optional AI pre-ranking enrichment (language/location/
      #   salary/relevance/url quality) to improve filtering and ranking.
      #   continue-on-error: true — deterministic ranking remains fallback.
      # ------------------------------------------------------------------
      - name: AI pre-rank enrichment (optional)
        run: python .github/scripts/ai_pre_rank_enrich.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Stage 2: deterministic rank (filter, dedup, score formula)
      # ------------------------------------------------------------------
      - name: Rank jobs
        run: python .github/scripts/rank_jobs.py

      # ------------------------------------------------------------------
      # Stage 2b: live validation loop (scrape+rank retries)
      #   Re-runs the deterministic pipeline a few times and validates
      #   output thresholds so transient fetch/parser issues self-heal.
      # ------------------------------------------------------------------
      - name: Validate scraper loop
        run: python .github/scripts/test_scraper_loop.py
        env:
          SCRAPER_FAIL_ON_FETCH_ERROR: "false"
          TEST_ATTEMPTS: "3"
          TEST_MIN_RAW: "10"
          TEST_MIN_RANKED: "10"
          TEST_MIN_ACTIVE_SOURCES: "2"
          TEST_MIN_RANKED_SOURCES: "2"
          TEST_MIN_NON_KARRIERE_RANKED_SOURCES: "1"
          TEST_MIN_NON_KARRIERE_RANKED_JOBS: "1"
          TEST_AUTO_ENABLE_INSECURE_SSL_ON_FAIL: "true"
          SCRAPER_SSL_FALLBACK_INSECURE: "false"
          # Optional self-hosted search provider (SearXNG)
          SCRAPER_SEARXNG_URL: ${{ secrets.SCRAPER_SEARXNG_URL }}
          SCRAPER_SEARXNG_KEY: ${{ secrets.SCRAPER_SEARXNG_KEY }}
          # Optional managed providers
          SCRAPER_SERPAPI_KEY: ${{ secrets.SCRAPER_SERPAPI_KEY }}
          SCRAPER_ZENSERP_KEY: ${{ secrets.SCRAPER_ZENSERP_KEY }}

      # ------------------------------------------------------------------
      # Stage 3a: MCP-assisted source suggestions (optional)
      #   Uses Copilot agent + SearXNG MCP server to propose additional
      #   scrape sources and writes /tmp/jobs/extra_sources.json.
      #   continue-on-error: true — Python AI fallback remains available.
      # ------------------------------------------------------------------
      - name: MCP source suggestions (optional)
        # github/copilot-agent is not available on this runner/repository scope.
        # Keep this stage as a no-op so the Python fallback path can continue.
        run: |
          echo "Skipping MCP source suggestions: action not available"
          rm -f /tmp/jobs/extra_sources.json

      - name: Detect MCP suggestions output
        id: detect_mcp_suggestions
        run: |
          if [ -f /tmp/jobs/extra_sources.json ]; then
            echo "has_extra_sources=true" >> "$GITHUB_OUTPUT"
            echo "MCP suggestions file detected"
          else
            echo "has_extra_sources=false" >> "$GITHUB_OUTPUT"
            echo "No MCP suggestions file detected"
          fi

      # ------------------------------------------------------------------
      # Stage 3a: AI source suggestions — only triggers when first pass
      #   returned fewer than 8 relevant listings.
      #   Calls GitHub Models once → writes /tmp/jobs/extra_sources.json
      #   with new/improved URLs.  continue-on-error: true.
      # ------------------------------------------------------------------
      - name: AI source suggestions (if results thin)
        if: steps.detect_mcp_suggestions.outputs.has_extra_sources != 'true'
        run: python .github/scripts/ai_suggest_sources.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Stage 3b: Second scrape pass using AI-suggested URLs.
      #   No-op if extra_sources.json is absent (enough results in pass 1).
      #   Merges new jobs into jobs_raw.json.  continue-on-error: true.
      # ------------------------------------------------------------------
      - name: Scrape extra sources (second pass)
        run: python .github/scripts/scrape_extra.py
        continue-on-error: true
        env:
          # Optional self-hosted search provider (SearXNG)
          SCRAPER_SEARXNG_URL: ${{ secrets.SCRAPER_SEARXNG_URL }}
          SCRAPER_SEARXNG_KEY: ${{ secrets.SCRAPER_SEARXNG_KEY }}
          # Optional managed providers
          SCRAPER_SERPAPI_KEY: ${{ secrets.SCRAPER_SERPAPI_KEY }}
          SCRAPER_ZENSERP_KEY: ${{ secrets.SCRAPER_ZENSERP_KEY }}

      # ------------------------------------------------------------------
      # Stage 3c: Re-rank after potential second pass
      #   Safe to run even if second pass was a no-op — just rewrites the
      #   same ranked output.  continue-on-error: true.
      # ------------------------------------------------------------------
      - name: Re-rank after second pass
        run: python .github/scripts/rank_jobs.py
        continue-on-error: true

      # ------------------------------------------------------------------
      # Stage 4: optional AI enrichment via GitHub Models REST API
      #   - Uses GITHUB_TOKEN (separate quota from Copilot agentic workflows)
      #   - One focused API call for final re-ranking + source quality notes
      #   - continue-on-error: true — workflow succeeds even if AI fails
      # ------------------------------------------------------------------
      - name: AI enrichment (optional)
        run: python .github/scripts/ai_enrich.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Stage 5: create GitHub issue (always runs)
      # ------------------------------------------------------------------
      - name: Create digest issue
        run: python .github/scripts/create_issue.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Upload all job data for debugging (7-day retention)
      # ------------------------------------------------------------------
      - name: Upload job data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-data-${{ github.run_id }}
          path: /tmp/jobs/
          retention-days: 7
          if-no-files-found: ignore
