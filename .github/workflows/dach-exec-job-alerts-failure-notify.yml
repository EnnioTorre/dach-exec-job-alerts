name: dach-exec-job-alerts-failure-notify

on:
  workflow_run:
    workflows: ["dach-exec-job-alerts"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  open-failure-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out' || github.event.workflow_run.conclusion == 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build issue body
        id: build
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ github.event.workflow_run.id }}"
          run_url="${{ github.event.workflow_run.html_url }}"
          conclusion="${{ github.event.workflow_run.conclusion }}"
          branch="${{ github.event.workflow_run.head_branch }}"
          sha="${{ github.event.workflow_run.head_sha }}"
          repo="${{ github.repository }}"

          title="[DACH Jobs] Workflow failure - ${conclusion} - run ${run_id}"

          body_file="$(mktemp)"
          {
            echo "The DACH executive jobs workflow failed and needs attention."
            echo
            echo "- Workflow: dach-exec-job-alerts"
            echo "- Conclusion: ${conclusion}"
            echo "- Branch: ${branch}"
            echo "- Commit: ${sha}"
            echo "- Run: ${run_url}"
            echo
            echo "If the failure contains Copilot/CAPI 429 quota errors, rerun later or use a different engine/quota source."
          } > "${body_file}"

          echo "title=${title}" >> "$GITHUB_OUTPUT"
          echo "body_file=${body_file}" >> "$GITHUB_OUTPUT"

      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "${{ steps.build.outputs.title }}" \
            --body-file "${{ steps.build.outputs.body_file }}" \
            --label job-digest \
            --label automation
