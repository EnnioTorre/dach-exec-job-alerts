name: tests

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/**"
      - ".github/tests/**"
      - "pytest.ini"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/tests/**"
      - "pytest.ini"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests beautifulsoup4 certifi langdetect

      - name: Run unit tests
        run: pytest
